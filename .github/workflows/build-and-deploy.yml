name: Build and Push Core API

on:
  push:
    branches:
      - mon-93-docker-build

permissions:
  contents: write
  id-token: write

jobs:
  build-core:
    uses: ./.github/workflows/reusable__build-push-image.yml
    with:
      service: 'core'

  build-pipeline:
    uses: ./.github/workflows/reusable__build-push-image.yml
    with:
      service: 'pipeline'