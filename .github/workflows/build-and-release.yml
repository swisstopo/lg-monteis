name: Build and Push Backend Images

on:
  push:
    branches:
      - mon-93-docker-build
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'webapp/**'
      - 'LICENSE'

permissions:
  contents: write # required for: git push tag
  id-token: write # required for: aws-actions/amazon-ecr-login

jobs:
  build-core:
    uses: ./.github/workflows/reusable__build-push-image.yml
    with:
      service: 'core'

  build-pipeline:
    uses: ./.github/workflows/reusable__build-push-image.yml
    with:
      service: 'pipeline'