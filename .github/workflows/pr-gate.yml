name: PR Gate

on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]

env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}

  # Used vor testing
  TS_DB_NAME: ${{ vars.TS_DB_NAME }}
  TS_FLYWAY_USER: ${{ vars.TS_FLYWAY_USER }}
  TS_FLYWAY_PWD: ${{ vars.TS_FLYWAY_PWD }}
  META_DB_NAME: ${{ vars.META_DB_NAME }}
  META_FLYWAY_USER: ${{ vars.META_FLYWAY_USER }}
  META_FLYWAY_PWD: ${{ vars.META_FLYWAY_PWD }}

  FDW_READ_USER: ${{ vars.FDW_READ_USER }}
  PIPELINE_APP_TS_DB_USER: ${{ vars.PIPELINE_APP_TS_DB_USER}}
  PIPELINE_APP_TS_DB_PWD: ${{ vars.PIPELINE_APP_TS_DB_PWD }}
  CORE_APP_META_DB_USER: ${{ vars.CORE_APP_META_DB_USER }}
  CORE_APP_META_DB_PWD: ${{ vars.CORE_APP_META_DB_PWD }}

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-24.04
    steps:
      - name: Enforce Conventional Commits
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            MON-\d+
            deps
          requireScope: true

  # noinspection YAMLSchemaValidation
  warmup-caches:
    name: Warm up Caches
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - parallel:
        - name: Setup Node and pnpm Environment
          uses: ./.github/actions/setup-node-pnpm

        - name: Setup Java Environment
          uses: ./.github/actions/setup-java-maven

      # Resolve mvn dependencies once globally
      - name: Download Maven Dependencies
        run: mvn dependency:go-offline

  security-scan:
    name: Trivy Security Scan
    needs: warmup-caches
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Java Environment
        uses: ./.github/actions/setup-java-maven

      - name: Execute Security Scan
        uses: ./.github/actions/trivy-scan

  format-backend:
    name: Format Backend
    needs: warmup-caches
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup Java Environment
        uses: ./.github/actions/setup-java-maven

      - name: Format backend
        run: mvn spotless:check

  format-frontend:
    name: Format Frontend
    needs: warmup-caches
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node Environment (Hits Cache)
        uses: ./.github/actions/setup-node-pnpm

      - name: Check frontend formatting
        run: pnpm run format:check

  # noinspection YAMLSchemaValidation
  license-governance:
    name: Enforce Licenses
    needs: warmup-caches
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Cache Generated SBOMs
        id: sbom-cache
        uses: actions/cache@v6
        with:
          path: |
            target/backend-sbom.json
            webapp/frontend-sbom.json
          key: ${{ runner.os }}-sboms-${{ hashFiles('**/pom.xml', '**/pnpm-lock.yaml') }}

      - parallel:
        - name: Setup Java Environment (Hits Cache)
          if: steps.sbom-cache.outputs.cache-hit != 'true'
          uses: ./.github/actions/setup-java-maven

        - name: Setup Node Environment (Hits Cache)
          if: steps.sbom-cache.outputs.cache-hit != 'true'
          uses: ./.github/actions/setup-node-pnpm

        - name: Install Anchore Grant License Scanner
          run: curl -sSfL https://get.anchore.io/grant | sudo sh -s -- -b /usr/local/bin

      - parallel:
        - name: Generate Backend SBOM (Maven)
          if: steps.sbom-cache.outputs.cache-hit != 'true'
          run: mvn org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom -DoutputFormat=json -DoutputName=backend-sbom

        - name: Generate Frontend SBOM
          if: steps.sbom-cache.outputs.cache-hit != 'true'
          uses: anchore/sbom-action@v0
          env:
            SYFT_JAVASCRIPT_SEARCH_REMOTE_LICENSES: "true"
          with:
            path: webapp/
            format: spdx-json
            output-file: webapp/frontend-sbom.json

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-artifacts
          path: |
            target/backend-sbom.json
            webapp/frontend-sbom.json
          retention-days: 5

      - parallel:
        - name: Enforce License Policy (Backend)
          run: grant check target/backend-sbom.json

        - name: Enforce License Policy (Frontend)
          run: grant check webapp/frontend-sbom.json

  # noinspection YAMLSchemaValidation
  run-backend-tests:
    name: Backend Tests
    needs: warmup-caches
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup Java Environment (Hits Cache)
        uses: ./.github/actions/setup-java-maven

      - name: Load Postgres Docker Cache
        uses: ./.github/actions/global-docker-cache
        with:
          image: 'postgres:18-alpine'

      - name: Load Test Containers Docker Cache
        uses: ./.github/actions/global-docker-cache
        with:
          image: 'testcontainers/ryuk:0.12.0'

      - name: Load TimeScaleDB Docker Cache
        uses: ./.github/actions/global-docker-cache
        with:
          image: 'timescale/timescaledb:latest-pg18'

      - name: Generate Sources
        run: mvn -T 2C install -DskipTests
      - parallel:
          - name: Run Core Unit Tests
            run: mvn -T 2C test -pl core -Djooq.codegen.skip=true

          - name: Run Core Integration Tests
            run: mvn -T 2C test-compile failsafe:integration-test -pl core -Djooq.codegen.skip=true

          - name: Run Pipeline Unit Tests
            run: mvn -T 2C test -pl pipeline -Djooq.codegen.skip=true

          - name: Run Pipeline Integration Tests
            run: mvn -T 2C test-compile failsafe:integration-test -pl pipeline -Djooq.codegen.skip=true

  # noinspection YAMLSchemaValidation
  run-frontend-unit-tests:
    name: Webapp Unit Tests
    needs: warmup-caches
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - parallel:
        - name: Setup Java Environment (Hits Cache)
          uses: ./.github/actions/setup-java-maven

        - name: Setup Node Environment (Hits Cache)
          uses: ./.github/actions/setup-node-pnpm

      - name: Load Postgres Docker Cache
        uses: ./.github/actions/global-docker-cache
        with:
          image: 'postgres:18-alpine'
      - name: Load Test Containers Docker Cache
        uses: ./.github/actions/global-docker-cache
        with:
          image: 'testcontainers/ryuk:0.12.0'
      - name: Load TimeScaleDB Docker Cache
        uses: ./.github/actions/global-docker-cache
        with:
          image: 'timescale/timescaledb:latest-pg18'

      - name: Generate Sources
        run: mvn -T 2C install -DskipTests -Dopenapi.codegen.skip=false

      - name: Install Node Modules and Playwright
        working-directory: webapp
        run: pnpm exec playwright install chromium --with-deps

      - name: Generate API
        working-directory: webapp
        run: pnpm exec openapi-generator-cli generate -g typescript-angular -i ../core/target/openapi/openapi.json -o src/app/core/generated

      - name: Run Webapp Tests
        working-directory: webapp
        run: pnpm vitest --browser.headless=true

  get-e2e-files:
    name: Get E2E test file to run
    if: contains(github.event.pull_request.labels.*.name, 'e2e-test')
    runs-on: ubuntu-24.04
    outputs:
      file_list: ${{ steps.generate-file-list.outputs.file_list }}
    steps:
      - name: Checkout Target Repo Code (to find test files)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.COMMIT_HASH }}

      - name: Install jq (JSON processor)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate list of E2E test files
        id: generate-file-list
        env:
          E2E_DIR: webapp/e2e
        run: |
          if [ -d "$E2E_DIR" ] && find "$E2E_DIR" -type f -print -quit | grep -q .; then
            FILES=$(find "$E2E_DIR" -type f | jq -R . | jq -s . | jq -c)
            echo "Found test files: $FILES"
          else
            echo "No test files found in $E2E_DIR or directory does not exist."
            FILES="[]"
          fi
          echo "file_list=$FILES" >> $GITHUB_OUTPUT

  # noinspection YAMLSchemaValidation
  run-e2e-tests:
    name: E2E file test
    if: contains(github.event.pull_request.labels.*.name, 'e2e-test')
    needs: [warmup-caches, get-e2e-files]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.get-e2e-files.outputs.file_list) }}
    steps:
      - uses: actions/checkout@v7

      - parallel:
          - name: Setup Java Environment (Hits Cache)
            uses: ./.github/actions/setup-java-maven

          - name: Setup Node Environment (Hits Cache)
            uses: ./.github/actions/setup-node-pnpm

      - name: Generate Sources
        run: mvn -T 2C install -DskipTests -Dopenapi.codegen.skip=false

      - name: Install Node Modules and Playwright
        working-directory: webapp
        run: pnpm exec playwright install chromium --with-deps

      - name: Generate API
        working-directory: webapp
        run: pnpm exec openapi-generator-cli generate -g typescript-angular -i ../core/target/openapi/openapi.json -o src/app/core/generated

      - name:
        working-directory: core
        run: SPRING_PROFILES_ACTIVE=test mvn spring-boot:test-run

      - name: Start Frontend
        working-directory: webapp
        run: pnpm run start

      - name: Run all e2e tests
        working-directory: webapp
        run: pnpm run e2e:headless ${{ matrix.file }}