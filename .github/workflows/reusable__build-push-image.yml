name: Reusable Build and Push Backend Images

on:
  workflow_call:
    inputs:
      service:
        description: 'Name of the service (used for directory path, image name, and tags)'
        required: true
        type: string

env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}

jobs:
  evaluate-version:
    name: Evaluate Tag for ${{ inputs.service }}
    runs-on: ubuntu-24.04
    # https://docs.github.com/en/actions/reference/security/secure-use#use-an-intermediate-environment-variable
    env:
      SERVICE: ${{ inputs.service }}
    outputs:
      is_tagged: ${{ steps.semver.outputs.is_tagged }}
      changed: ${{ steps.semver.outputs.changed }}
      version: ${{ steps.semver.outputs.version }}
      version_tag: ${{ steps.semver.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Must fetch history so the bot can read the commits
          filter: blob:none

      # This is a dry run which is used later to set the github tag and have unique versioning
      # change_path guards unnecessary execution!
      - name: "[TAG]: Calculate Semantic Version"
        id: semver
        uses: paulhatch/semantic-version@v6.0.3
        with:
          tag_prefix: "${{ env.SERVICE }}-v"
          change_path: "${{ env.SERVICE }}/ pom.xml"

      - name: "[TAG]: Check if already tagged"
        run: |
          echo "is tagged: ${{ steps.semver.outputs.is_tagged }}"
          echo "changed: ${{ steps.semver.outputs.changed }}"

  build-and-push:
    name: Build & Push ${{ inputs.service }}
    needs: evaluate-version
    # This single condition controls the execution of the entire job
    if: needs.evaluate-version.outputs.is_tagged == 'false' && needs.evaluate-version.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write # required for: git push tag
      id-token: write # required for: aws-actions/amazon-ecr-login
    env:
      SERVICE: ${{ inputs.service }}
    steps:
      - name: "[AWS]: Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ECR_PUSH }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: "[AWS]: Additional steps"
        run: |
          aws sts get-caller-identity

      - name: "[AWS]: Login to Amazon ECR"
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2.1.6

      - name: "[BUILD]: Checkout Code"
        uses: actions/checkout@v7

      - name: "[BUILD]: Setup Java Environment"
        uses: ./.github/actions/setup-java-maven

      - name: "[BUILD]: Compile Internal Dependencies"
        run: mvn -T 2C install -DskipTests -Dopenapi.codegen.skip=false

      - name: "[BUILD]: Build Spring Boot Image"
        env:
          VERSION: ${{ needs.evaluate-version.outputs.version }}
        run: |
          mvn -pl ${{ env.SERVICE }} spring-boot:build-image \
            -Dspring-boot.build-image.imageName=local-registry/${{ env.SERVICE }}:$VERSION \
            -DskipTests

      - name: "[SECURITY]: Run Trivy Image Scan"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'local-registry/${{ env.SERVICE }}:${{ needs.evaluate-version.outputs.version }}'
          scan-type: 'image'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'

      - name: "[PUSH]: Tag and push docker image to Amazon ECR"
        env:
          REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
          REPOSITORY: ${{ env.SERVICE }}
          VERSION: ${{ needs.evaluate-version.outputs.version }}
        run: |
          # Tag the locally built image with the ECR registry path + SemVer
          docker tag local-registry/${{ env.SERVICE }}:$VERSION ${REGISTRY}/${REPOSITORY}:$VERSION

          # Push the tag to AWS ECR
          docker push ${REGISTRY}/${REPOSITORY}:$VERSION

      - name: "[TAG]: Push Git Tag to GitHub"
        env:
          TAG: ${{ needs.evaluate-version.outputs.version_tag }}
        run: |
          echo "[INFO]: Tagging commit with $TAG"

          # Create and push the tag
          git tag $TAG
          git push origin $TAG