name: License Governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  enforce-licenses:
    name: Enforce Open Source Licenses
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      # --- 1. Check Cache First ---
      # Updated to cache both SBOM files
      - name: Cache Generated SBOMs
        id: sbom-cache
        uses: actions/cache@v5
        with:
          path: |
            target/backend-sbom.json
            frontend-sbom.json
          key: ${{ runner.os }}-sboms-${{ hashFiles('**/pom.xml', '**/pnpm-lock.yaml') }}

      # --- 2. Backend Setup & Generate SBOM (Skips on cache hit) ---
      - name: Set up JDK ${{ vars.JAVA_VERSION }}
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: ${{ vars.JAVA_DISTRIBUTION }}
          server-id: github
          settings-path: ${{ github.workspace }}
          cache: maven

      - name: Generate Backend SBOM (Maven)
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        # Native Maven plugin delegates dependency resolution to Maven itself.
        # makeAggregateBom rolls core, pipeline, and contracts into one SBOM.
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom -DoutputFormat=json -DoutputName=backend-sbom

      # --- 3. Frontend Setup & Generate SBOM (Skips on cache hit) ---
      - name: Install pnpm
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v6
        with:
          package_json_file: webapp/package.json

      - name: Set up Node.js
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install Frontend Dependencies
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        working-directory: webapp
        run: pnpm install --frozen-lockfile

      - name: Install Syft
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Generate Frontend SBOM (Syft)
        if: steps.sbom-cache.outputs.cache-hit != 'true'
        env:
          SYFT_JAVASCRIPT_SEARCH_REMOTE_LICENSES: "true"
        # We point Syft STRICTLY at the webapp directory so it ignores the Java POMs entirely
        run: syft dir:webapp -o spdx-json=frontend-sbom.json

      # --- 4. Always Run Policy Enforcement ---
      - name: Install Anchore Grant
        run: curl -sSfL https://get.anchore.io/grant | sudo sh -s -- -b /usr/local/bin

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-artifacts
          path: |
            target/backend-sbom.json
            frontend-sbom.json
          retention-days: 5

      - name: Enforce License Policy (Backend)
        run: grant check target/backend-sbom.json

      - name: Enforce License Policy (Frontend)
        run: grant check frontend-sbom.json