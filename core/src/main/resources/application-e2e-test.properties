# Logging
logging.level.ch.swisstopo.monteis.core=DEBUG
logging.level.springframework.security=DEBUG
logging.level.org.jooq.tools.LoggerListener=DEBUG

# Extras
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# DB Configuration (JOOQ). spring.datasource.url is overridden dynamically once
# TestcontainersConfiguration's Postgres containers are up. Credentials are the fixed dev/test
# users seeded by docker/dataset-meta/init_meta.sql, so this profile needs no docker/.env.
spring.datasource.username=core_app
spring.datasource.password=pwd_core_app

# Disable flyway auto-run; it is applied manually to both DBs, see TestcontainersConfiguration
spring.flyway.enabled=false

# Config for the manual Flyway run against the Testcontainers-provisioned DBs
meta.flyway.user.name=core_flyway
meta.flyway.user.pwd=pwd_core_flyway
ts.flyway.user.name=ts_flyway
ts.flyway.user.pwd=pwd_ts_flyway

meta.db.name=monteis-meta
ts.db.name=monteis-tsdb

fdw.read.user=fdw_user

# Real Keycloak, provisioned by KeycloakTestcontainersConfiguration on a fixed host port distinct
# from the local docker-compose Keycloak (8081), so both can run side by side. Kept in sync with
# webapp/public/env.e2e.json.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:18081/auth/realms/monteis
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:18081/auth/realms/monteis/protocol/openid-connect/certs
