# Logging
logging.level.ch.swisstopo.monteis.core=WARN
logging.level.springframework.security=WARN

# Extras
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# DB Configuration (JOOQ)
spring.datasource.url=${META_DB_JDBC_URL}
spring.datasource.username=${DB_APP_USER}
spring.datasource.password=${DB_APP_PWD}

# Flyway config
spring.flyway.enabled=false

app.migration.meta.dbname=${META_DB_NAME}
app.migration.meta.url=${META_DB_JDBC_URL}
app.migration.meta.username=${META_MIGRATION_USER}
app.migration.meta.password=${META_MIGRATION_PWD}
app.migration.meta.locations=classpath:/db/migration/meta

app.migration.timescale.dbname=${TS_DB_NAME}
app.migration.timescale.url=${TS_DB_JDBC_URL}
app.migration.timescale.username=${TS_MIGRATION_USER}
app.migration.timescale.password=${TS_MIGRATION_PWD}
app.migration.timescale.locations=classpath:/db/migration/timeseries

# FDW_TS_HOST must match networks service name!
app.migration.meta.placeholders.fdw_ts_host=${FDW_TS_HOST}
app.migration.meta.placeholders.fdw_ts_port=${FDW_TS_PORT}
app.migration.meta.placeholders.fdw_app_user_name=${spring.datasource.username}
app.migration.meta.placeholders.fdw_ts_dbname=${app.migration.timescale.dbname}
app.migration.meta.placeholders.fdw_ts_user=${app.migration.timescale.username}
app.migration.meta.placeholders.fdw_ts_password=${app.migration.timescale.password}