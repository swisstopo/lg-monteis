# Logging
logging.level.ch.swisstopo.monteis.core=DEBUG
logging.level.springframework.security=DEBUG

# Extras
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Loads the global configs for the db setup
spring.config.import=optional:file:docker/.env[.properties], optional:file:../docker/.env[.properties]

# DB Configuration (JOOQ)
spring.datasource.url=jdbc:postgresql://localhost:5432/${META_DB_NAME}
spring.datasource.username=${CORE_APP_META_DB_USER}
spring.datasource.password=${CORE_APP_META_DB_PWD}

# Disable flyway since we apply it to two DBs
spring.flyway.enabled=false

# Config for Manual Flyway run in integration testing
meta.flyway.user.name=${META_FLYWAY_USER}
meta.flyway.user.pwd=${META_FLYWAY_PWD}
ts.flyway.user.name=${TS_FLYWAY_USER}
ts.flyway.user.pwd=${TS_FLYWAY_PWD}

meta.db.name=${META_DB_NAME}
ts.db.name=${TS_DB_NAME}

fdw.read.user=${FDW_READ_USER}