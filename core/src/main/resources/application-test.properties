# Logging
logging.level.ch.swisstopo.monteis.core=DEBUG
logging.level.springframework.security=DEBUG

# Extras
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# DB Configuration (JOOQ)
spring.datasource.url=jdbc:postgresql://localhost:5432/${app.migration.meta.dbname}
spring.datasource.username=core_app
spring.datasource.password=pwd_core_app

# Flyway config
spring.flyway.enabled=false

app.migration.meta.dbname=monteis-meta
app.migration.meta.url=jdbc:postgresql://localhost:5432/${app.migration.meta.dbname}
app.migration.meta.username=core_flyway
app.migration.meta.password=pwd_core_flyway
app.migration.meta.locations=classpath:/db/migration/meta

app.migration.timescale.dbname=monteis-tsdb
app.migration.timescale.url=jdbc:postgresql://localhost:5433/${app.migration.timescale.dbname}
app.migration.timescale.username=ts_flyway
app.migration.timescale.password=pwd_ts_flyway
app.migration.timescale.locations=classpath:/db/migration/timeseries,classpath:/db/migration/timeseries-data

# Host must match docker compose service name
app.migration.meta.placeholders.fdw_ts_host=time_series_db
app.migration.meta.placeholders.fdw_ts_port=5432
app.migration.meta.placeholders.fdw_app_user_name=${spring.datasource.username}
app.migration.meta.placeholders.fdw_ts_dbname=${app.migration.timescale.dbname}
app.migration.meta.placeholders.fdw_ts_user=${app.migration.timescale.username}
app.migration.meta.placeholders.fdw_ts_password=${app.migration.timescale.password}