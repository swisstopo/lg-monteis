# Contains profile agnostic default settings
spring.application.name=core
server.port=8080

# Spring default profile
spring.profiles.active=prod

# Spring disable auto user generation
spring.security.user.name=none
spring.security.user.password=none

# DB Config
spring.datasource.driver-class-name=org.postgresql.Driver

# Digital twin tileset storage (see ch.swisstopo.monteis.core.modules.visualization). Tiling
# happens entirely client-side (the frontend tiles the uploaded IFC in-browser and POSTs the
# result to TileUploadController) - the backend just stores and serves whatever it's handed, and
# /model/tiles/** stays 503 until something has been uploaded. A relative output-dir is resolved
# against the classpath (see TileOutputDirResolver), i.e. mapped back to
# core/src/main/resources/<output-dir> - NOT against the JVM's working directory, which varies by
# how the app is launched - so uploaded tiles reliably live inside the repo instead of wherever
# the launcher's cwd happened to be.
monteis.tiling.output-dir=tiles

# The tile conversion above writes into src/main/resources, which devtools otherwise watches as a
# classpath resource directory - excluded so writing tiles doesn't trigger a restart loop.
spring.devtools.restart.exclude=tiles/**

# Client-side tiled models (see TileUploadController) can easily exceed Spring's 1MB/10MB defaults.
spring.servlet.multipart.max-file-size=20000MB
spring.servlet.multipart.max-request-size=50000MB

# The embedded Tomcat connector enforces its own, independent request-size and part-count caps
# ahead of the spring.servlet.multipart.* properties above - left at their defaults (2MB request
# body, 10 parts), Tomcat rejects a large multi-file tile upload before Spring even sees it, and
# that rejection surfaces as the exact same MaxUploadSizeExceededException, which makes it look
# like the properties above did nothing. <=0 disables each limit.
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
server.tomcat.max-part-count=-1