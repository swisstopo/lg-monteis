services:
  ts_db:
    container_name: timescale-db
    image: timescale/timescaledb:latest-pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: ${TS_DB_NAME}
    ports:
      - "5433:5432"
    profiles: [ core, pipeline]
    volumes:
      - ./dataset-tsdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d '${TS_DB_NAME}'" ]
      interval: 5s
      timeout: 3s
      retries: 10

  flyway-timescale:
    image: flyway/flyway
    depends_on:
      ts_db:
        condition: service_healthy
    profiles: [ core, pipeline ]
    volumes:
      - ./../db/timescale/schema:/flyway/sql/schema
      - ./../db/timescale/seed:/flyway/sql/seed
    # Uses the environment variable if present; otherwise defaults to schema + seed
    command: > 
      -url=jdbc:postgresql://ts_db:5432/${TS_DB_NAME}
      -user=${TS_FLYWAY_USER}
      -password=${TS_FLYWAY_PWD}
      -placeholders.fdw_read_user=${FDW_READ_USER}
      -locations=${TS_FLYWAY_LOCATIONS:-filesystem:/flyway/sql/schema,filesystem:/flyway/sql/seed}
      migrate

  metadata_db:
    container_name: monteis-meta-db
    image: postgres:18
    restart: unless-stopped
    depends_on:
      ts_db:
        condition: service_healthy
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: ${META_DB_NAME}
    ports:
      - "5432:5432"
    profiles: [ core ]
    volumes:
      - ./dataset-meta:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d '${META_DB_NAME}'"]
      interval: 5s
      timeout: 3s
      retries: 10

  flyway-metadata :
    image: flyway/flyway
    depends_on:
      metadata_db:
        condition: service_healthy
    profiles: [ core ]
    volumes:
      - ./../db/meta/schema:/flyway/sql/schema
      - ./../db/meta/seed:/flyway/sql/seed
    command: >
      -url=jdbc:postgresql://metadata_db:5432/${META_DB_NAME}
      -user=${META_FLYWAY_USER}
      -password=${META_FLYWAY_PWD}
      -locations=filesystem:/flyway/sql/schema,filesystem:/flyway/sql/seed
      migrate

  kafka:
    image: apache/kafka:4.3.1
    container_name: local-msk-broker
    profiles: [ pipeline ]
    ports:
      - "9092:9092"
    environment:
      # KRaft specific configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'local-msk-dev-cluster-123'

      # Automatically create topics when a producer writes to them
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      # Default partitions for newly created topics
      KAFKA_NUM_PARTITIONS: 6

      # How long to retain data (e.g., 7 days in milliseconds)
      KAFKA_LOG_RETENTION_MS: 15766388736

      # Listener configuration (Internal Docker network vs Localhost)
      KAFKA_LISTENERS: 'CONTROLLER://kafka:29093,PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      # Single-node local development settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  connect:
    image: apache/kafka:4.3.1
    container_name: local-msk-connect
    ports:
      - "8083:8083"
    profiles: [ pipeline ]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SOLEXPERTS_KAFKA_USERNAME: ${SOLEXPERTS_KAFKA_USERNAME}
      SOLEXPERTS_KAFKA_PASSWORD: ${SOLEXPERTS_KAFKA_PASSWORD}
    volumes:
      - ./connect/connect-distributed.properties:/opt/kafka/config/connect-distributed.properties
    # We override the default command so that the image starts as 'Connect' and not as a 'Broker'
    command: [
      "/opt/kafka/bin/connect-distributed.sh",
      "/opt/kafka/config/connect-distributed.properties"
    ]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/8083"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  connect-init:
    image: curlimages/curl:8.21.0
    profiles: [ pipeline ]
    container_name: local-msk-connect-init
    depends_on:
      connect:
        condition: service_healthy
    volumes:
      # Mount the file directly to its final destination
      - ./connect/mm2-config.json:/tmp/mm2-config.json
    command: |
      sh -c "
        echo '✅ Kafka Connect is up! Registering MirrorMaker 2 connector...'
        curl -f -X POST -H 'Content-Type: application/json' -d @/tmp/mm2-config.json http://connect:8083/connectors
        echo '\n🎉 Connector registered successfully!'
      "

  # ── Keycloak local IdP (MON-18) ─────────────────────────────────────────────
  # Local dev identity provider. Uses Keycloak's own dev store (start-dev), NOT
  # RDS. Seeded from a realm rendered by `realm-builder` (base + patch.local.json,
  # same P2 approach as the cloud realm in lg-monteis-infra).
  realm-builder:
    image: mikefarah/yq:4
    container_name: keycloak-realm-builder
    profiles: [ core ]
    volumes:
      - ./keycloak/realm:/realm:ro
      - kc_realm_out:/out
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        # jq-style targeted merge in yq: set SPA URLs + append local users.
        yq -o=json eval-all '
          select(fi==0) as $base | select(fi==1) as $p
          | $base
          | .clients |= map(select(.clientId=="monteis-spa") .redirectUris = $p.spa.redirectUris | .webOrigins = $p.spa.webOrigins)
          | .users = (($base.users // []) + ($p.users // []))
        ' /realm/realm-base.json /realm/patch.local.json > /out/realm-local.json
        echo "rendered /out/realm-local.json"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: monteis-keycloak
    profiles: [ core ]
    depends_on:
      realm-builder:
        condition: service_completed_successfully
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HTTP_RELATIVE_PATH: /auth
    command: [ "start-dev", "--import-realm" ]
    ports:
      - "8081:8080" # 8080 taken by kafka-connect host mapping elsewhere; Keycloak on 8081
    volumes:
      - kc_realm_out:/opt/keycloak/data/import:ro
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  kc_realm_out: