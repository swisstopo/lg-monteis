<div class="metrics-panel">
  <h2 class="panel-heading">AG Grid - Database Records</h2>

  @if (metricsResource.isLoading()) {
    <div class="loading-container">
      <p class="loading-text">Streaming logs from database...</p>
    </div>
  }
  @else if (metricsResource.error()) {
    <p class="error-text">Failed to connect to the backend server.</p>
  }
  @else {
    <app-table
      class="custom-grid"
      [rows]="metricsResource.value() ?? []"
      [columns]="wrappedCols"
      (rowClicked)="onWrappedRow($event)">
    </app-table>
  }
</div>
